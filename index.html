<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#f2b9cc">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>狗狗叠叠乐 3.1</title>
<style>
:root{
 --ink:#4d3a35;--paper:#fff9ed;--pink:#f1a6be;--rose:#df7698;--gold:#e9b94f;
 --mint:#99c7aa;--blue:#8fbfd8;--shadow:rgba(61,40,35,.24);--edge:#fff6;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;overscroll-behavior:none;background:#e9c7d2;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
button{font:inherit;color:inherit;border:0}
.screen{position:fixed;inset:0;display:none}
.screen.active{display:flex}
.paperNoise{background:
 radial-gradient(circle at 10% 10%,#fff7 0 2px,transparent 3px),
 radial-gradient(circle at 80% 30%,#fff5 0 3px,transparent 4px),
 linear-gradient(180deg,#f3bbcd,#f9d9c5)}
#menu{align-items:center;justify-content:center;padding:22px}
.menuShell{width:min(440px,95vw);border-radius:34px;padding:14px;background:#f5d9c8;border:4px solid #fff8;box-shadow:0 20px 50px #0003;position:relative;overflow:hidden}
.menuShell:before,.menuShell:after{content:"";position:absolute;border-radius:50%;background:#fff3}
.menuShell:before{width:170px;height:170px;right:-55px;top:-60px}.menuShell:after{width:120px;height:120px;left:-45px;bottom:-40px}
.brandCard{position:relative;background:linear-gradient(160deg,#fff9,#ffe8ce);border:3px solid white;border-radius:26px;padding:22px 18px 18px;box-shadow:0 8px 20px var(--shadow);text-align:center}
.logoDog{font-size:48px;filter:drop-shadow(0 4px 0 #fff)}.logo{font-size:33px;font-weight:1000;letter-spacing:1px;text-shadow:0 3px white}.tag{font-size:11px;opacity:.65;margin-top:5px}
.saveStrip{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:13px 0}
.slotBtn{background:#fff9;border:2px solid #fff;border-radius:15px;padding:9px 4px;box-shadow:0 4px 10px #0001;font-size:10px}
.slotBtn.active{outline:3px solid #e685a3;background:#fff}.slotBtn b{display:block;font-size:13px}
.currencyRow{display:flex;gap:7px;justify-content:center;margin-bottom:12px}.currency{background:#fff;border-radius:14px;padding:7px 10px;box-shadow:0 3px 9px #0001;font-size:11px}
.menuBtn{position:relative;width:100%;padding:14px 12px 14px 58px;border-radius:18px;margin:7px 0;background:#fff;border:2px solid #fff;box-shadow:0 5px 13px var(--shadow);font-weight:900;text-align:left}
.menuBtn i{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:35px;height:35px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-style:normal;font-size:20px;background:#f6d4df}
.menuBtn.primary{background:linear-gradient(135deg,#f391af,#f0bd69);color:white;text-shadow:0 1px #0002}.menuBtn.home{background:linear-gradient(135deg,#8fc9a6,#8ebfda);color:#fff}.menuBtn:active{transform:translateY(1px)}
.topbar{height:72px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:max(8px,env(safe-area-inset-top)) 9px 8px;background:#fff8;backdrop-filter:blur(9px);border-bottom:2px solid #fff;box-shadow:0 4px 13px #0001;z-index:20}
.topbar h2{margin:0;font-size:19px}.back,.pill{background:#fff;border:2px solid #fff;border-radius:14px;padding:8px 10px;box-shadow:0 3px 9px var(--shadow);font-size:11px}.back{font-weight:800}
#run,#home{flex-direction:column}
.runBody{flex:1;min-height:0;position:relative;background:linear-gradient(180deg,#f0bfd0,#f9e4c9)}
#mapView,#battleView{position:absolute;inset:0;display:none}
#mapView.active,#battleView.active{display:block}
.mapWrap{height:100%;overflow:auto;padding:18px 14px 30px}
.mapBanner{background:#fff9;border:3px solid #fff;border-radius:22px;padding:13px;text-align:center;box-shadow:0 7px 16px var(--shadow);margin-bottom:18px}.mapBanner b{font-size:18px}.mapBanner div{font-size:10px;opacity:.65}
.path{display:flex;flex-direction:column;gap:17px;align-items:center}
.row{width:100%;display:flex;justify-content:space-around;position:relative}.row:before{content:"";position:absolute;left:50%;top:-20px;width:3px;height:20px;background:#fff8;border-radius:3px}
.node{width:84px;height:84px;border-radius:25px;background:#fff9;border:3px solid #fff;box-shadow:0 7px 15px var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:900}.node span{font-size:29px}.node.lock{opacity:.42;filter:grayscale(1)}.node.done{background:#ddf0df}.node.current{outline:4px solid #e982a2}
#battleView{padding:7px 9px max(7px,env(safe-area-inset-bottom))}
.battleGrid{height:100%;display:flex;flex-direction:column}
.hud{height:62px;display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding-bottom:6px}.hud div{background:#fff9;border:2px solid #fff;border-radius:14px;text-align:center;padding:6px 3px;box-shadow:0 4px 10px var(--shadow);font-size:9px}.hud b{display:block;font-size:15px}
#stage{position:relative;flex:1;min-height:0;border:4px solid #fff;border-radius:28px 28px 18px 18px;overflow:hidden;box-shadow:0 13px 27px var(--shadow),inset 0 0 0 2px #d6aa8b;background:
 linear-gradient(#fff3 1px,transparent 1px),linear-gradient(90deg,#fff3 1px,transparent 1px),
 linear-gradient(180deg,#f6dfc7,#ecd0ae);background-size:24px 24px,24px 24px,auto}
canvas{display:block;width:100%;height:100%}
#danger{position:absolute;top:94px;left:0;right:0;border-top:2px dashed #cf5f7b;pointer-events:none}#danger:after{content:"危险线";position:absolute;right:8px;top:-18px;font-size:9px;background:#fff9;padding:2px 5px;border-radius:7px}
#aim{position:absolute;top:0;height:95px;width:2px;background:linear-gradient(#9d6678,transparent);pointer-events:none}
#nodeRule{position:absolute;left:8px;top:8px;z-index:4;background:#fff9;border:2px solid #fff;border-radius:14px;padding:7px 9px;font-size:10px;max-width:175px;box-shadow:0 4px 11px #0001}
#nextCard{position:absolute;right:8px;top:8px;width:74px;height:69px;background:#fff9;border:2px solid #fff;border-radius:14px;text-align:center;font-size:9px;padding-top:2px;z-index:4;box-shadow:0 4px 11px #0001}
#nextFace{width:54px;height:47px}
.battleFoot{height:61px;display:flex;align-items:center;justify-content:space-between}.traits{font-size:9px;max-width:72%}.smallBtn{background:#fff;border-radius:14px;padding:9px 10px;box-shadow:0 4px 10px var(--shadow);font-weight:800}
#home{background:linear-gradient(180deg,#cde7df,#f5e9d3)}
.homeTabs{height:48px;display:flex;gap:7px;padding:7px 10px}.homeTabs button{flex:1;border-radius:14px;background:#fff8;border:2px solid #fff;box-shadow:0 3px 9px #0001;font-size:11px;font-weight:800}.homeTabs button.active{background:#fff}
.homeScene{position:relative;flex:1;min-height:0;overflow:hidden;border-top:2px solid #fff;border-bottom:2px solid #fff}
#petCanvas{position:absolute;inset:0}
.homeOverlay{position:absolute;left:8px;right:8px;top:8px;display:flex;justify-content:space-between;pointer-events:none}.homeOverlay>*{pointer-events:auto}
.petCard{background:#fff9;border:2px solid #fff;border-radius:15px;padding:8px 10px;box-shadow:0 4px 11px #0002;font-size:10px}
.homeActions{height:82px;display:flex;gap:7px;overflow-x:auto;padding:8px 10px max(8px,env(safe-area-inset-bottom))}
.homeAction{min-width:82px;background:#fff;border:2px solid #fff;border-radius:16px;box-shadow:0 4px 10px #0001;font-size:10px;padding:7px}.homeAction span{display:block;font-size:22px}
.modal{position:fixed;inset:0;z-index:60;background:#49383388;display:none;align-items:center;justify-content:center;padding:17px}
.panel{width:min(440px,96vw);max-height:88dvh;overflow:auto;background:#fff9ed;border:4px solid #fff;border-radius:28px;padding:18px;box-shadow:0 20px 55px #0004;text-align:center}
.panel h2{margin:2px 0 7px}.panel p{font-size:11px;line-height:1.45}
.cards{display:grid;gap:9px}.card{background:#fff;border:2px solid #ead8ca;border-radius:17px;padding:10px;text-align:left;box-shadow:0 3px 9px #0001}.card b{display:block}.card small{font-size:10px;opacity:.7}
.shopGrid,.inventoryGrid,.dogGrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.shopItem,.invItem,.dogItem{background:#fff;border:2px solid #ead8ca;border-radius:17px;padding:8px;text-align:left;box-shadow:0 4px 10px #0001}
.shopArt{height:80px;border-radius:12px;background:linear-gradient(145deg,#f9dce8,#f8ebcd);display:flex;align-items:center;justify-content:center;margin-bottom:6px;overflow:hidden}.shopArt canvas{width:100%;height:100%}
.rarity{font-size:9px;border-radius:7px;padding:2px 5px;display:inline-block;margin-top:3px}.common{background:#eee}.uncommon{background:#dff2df}.rare{background:#dfeeff}.epic{background:#eee2fa}.legendary{background:#ffe7a8}
.wide{width:100%;padding:12px;border-radius:15px;background:#fff;box-shadow:0 4px 12px #0001;font-weight:800;margin-top:8px}
#toast{position:fixed;z-index:90;left:50%;bottom:96px;transform:translateX(-50%) translateY(12px);background:#59443d;color:white;border-radius:13px;padding:8px 13px;font-size:11px;opacity:0;transition:.2s}
</style>
</head>
<body>
<section id="menu" class="screen active paperNoise">
 <div class="menuShell">
  <div class="brandCard">
   <div class="logoDog">🐶</div><div class="logo">狗狗叠叠乐</div><div class="tag">手绘纸偶风 · 肉鸽闯关 · 狗狗之家</div>
   <div class="saveStrip">
    <button class="slotBtn active" data-slot="1"><b>档位 1</b><span>当前</span></button>
    <button class="slotBtn" data-slot="2"><b>档位 2</b><span>新档</span></button>
    <button class="slotBtn" data-slot="3"><b>档位 3</b><span>新档</span></button>
   </div>
   <div class="currencyRow"><div class="currency">🏡 狗币 <b id="menuHomeCoins">0</b></div><div class="currency">🐾 犬种 <b id="menuUnlocked">3</b></div></div>
   <button class="menuBtn primary" id="startRun"><i>🎲</i>开始冒险</button>
   <button class="menuBtn home" id="openHome"><i>🏠</i>进入狗狗之家</button>
   <button class="menuBtn" id="openCollection"><i>📖</i>犬种图鉴</button>
  </div>
 </div>
</section>

<section id="run" class="screen">
 <div class="topbar"><button class="back" id="leaveRun">← 主菜单</button><h2>冒险路线</h2><div class="pill">🪙 <b id="runCoins">0</b>　🏡 <b id="pendingHome">0</b></div></div>
 <div class="runBody">
  <div id="mapView" class="active"><div class="mapWrap"><div class="mapBanner"><b>第一章 · 暖阳街区</b><div>完成节点后沿路线前进，商店仅在商店节点开放</div></div><div id="path" class="path"></div></div></div>
  <div id="battleView"><div class="battleGrid">
   <div class="hud"><div><b id="battleBones">0</b>骨头</div><div><b id="battleGoal">0</b>目标</div><div><b id="battleDrops">0</b>剩余</div><div><b id="battleCoins">0</b>金币</div></div>
   <div id="stage"><div id="nodeRule"></div><div id="nextCard">下一个<br><canvas id="nextFace" width="108" height="94"></canvas></div><div id="danger"></div><div id="aim"></div><canvas id="game"></canvas></div>
   <div class="battleFoot"><div class="traits" id="traitText">暂无特性</div><button class="smallBtn" id="musicBtn">🎵</button></div>
  </div></div>
 </div>
</section>

<section id="home" class="screen">
 <div class="topbar"><button class="back" id="leaveHome">← 主菜单</button><h2>狗狗之家</h2><div class="pill">🏡 <b id="homeCoins">0</b></div></div>
 <div class="homeTabs"><button class="active" data-room="inside">室内</button><button data-room="outside">室外</button></div>
 <div class="homeScene"><canvas id="petCanvas"></canvas><div class="homeOverlay"><div class="petCard"><b id="petName">奶狗</b><br>心情 <span id="petMood">😊</span>　饱腹 <span id="petFull">70</span></div><button class="petCard" id="switchPet">换狗</button></div></div>
 <div class="homeActions"><button class="homeAction" id="feedBtn"><span>🍖</span>喂食</button><button class="homeAction" id="decorateBtn"><span>🛋️</span>装修</button><button class="homeAction" id="inventoryBtn"><span>🎒</span>仓库</button><button class="homeAction" id="petBtn"><span>🤲</span>摸摸</button><button class="homeAction" id="homeMusicBtn"><span>🎵</span>音乐</button></div>
</section>

<div class="modal" id="choiceModal"><div class="panel"><h2 id="choiceTitle"></h2><p id="choiceText"></p><div id="choiceList" class="cards"></div></div></div>
<div class="modal" id="shopModal"><div class="panel"><h2>旅途商店</h2><p>只在商店节点开放。</p><div id="shopGrid" class="shopGrid"></div><button class="wide" id="closeShop">离开商店</button></div></div>
<div class="modal" id="homeShopModal"><div class="panel"><h2 id="homeShopTitle">狗狗用品</h2><div id="homeShopGrid" class="inventoryGrid"></div><button class="wide closeModal">关闭</button></div></div>
<div class="modal" id="collectionModal"><div class="panel"><h2>犬种图鉴</h2><p>每种犬种拥有独立立绘；解锁后可入住狗狗之家。</p><div id="dogGrid" class="dogGrid"></div><button class="wide closeModal">关闭</button></div></div>
<div class="modal" id="resultModal"><div class="panel"><h2 id="resultTitle">结算</h2><p id="resultText"></p><button class="wide" id="resultContinue">继续</button></div></div>
<div id="toast"></div>

<script>
(()=>{
'use strict';
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
let currentSlot=1;
const DOGS=[
 {name:'奶狗',fur:'#f3d2aa',ear:'#c88f5d',kind:'round',rarity:'common'},
 {name:'柯基',fur:'#e99c51',ear:'#a45e36',kind:'long',rarity:'common'},
 {name:'柴犬',fur:'#d98549',ear:'#95502f',kind:'fox',rarity:'common'},
 {name:'比熊',fur:'#fff9ef',ear:'#dfd1c4',kind:'cloud',rarity:'uncommon'},
 {name:'法斗',fur:'#aaa19c',ear:'#5f5855',kind:'square',rarity:'uncommon'},
 {name:'金毛',fur:'#dfad56',ear:'#a66b31',kind:'golden',rarity:'uncommon'},
 {name:'哈士奇',fur:'#9aa7b4',ear:'#576674',kind:'husky',rarity:'rare'},
 {name:'萨摩耶',fur:'#fffdf7',ear:'#ddd1c8',kind:'samoyed',rarity:'rare'},
 {name:'阿拉斯加',fur:'#686b70',ear:'#363a41',kind:'malamute',rarity:'rare'},
 {name:'边牧',fur:'#393c42',ear:'#22252a',kind:'collie',rarity:'rare'},
 {name:'拉布拉多',fur:'#d4a05e',ear:'#855a35',kind:'lab',rarity:'uncommon'},
 {name:'博美',fur:'#e8b16d',ear:'#a66e3d',kind:'pomeranian',rarity:'rare'},
 {name:'巴哥',fur:'#c8ae86',ear:'#4d443e',kind:'pug',rarity:'uncommon'},
 {name:'秋田犬',fur:'#d8a05e',ear:'#8f5b34',kind:'akita',rarity:'epic'},
 {name:'伯恩山',fur:'#473c39',ear:'#221f1e',kind:'bernese',rarity:'epic'},
 {name:'大丹犬',fur:'#8c8f96',ear:'#45484d',kind:'greatdane',rarity:'epic'},
 {name:'月光萨摩耶',fur:'#dce9ff',ear:'#9eb7da',kind:'moon',rarity:'legendary'},
 {name:'皇冠柯基',fur:'#f0a45c',ear:'#9e5631',kind:'royalcorgi',rarity:'legendary'}
];
const ITEMS=[
 {id:'kibble',name:'基础狗粮',icon:'🥣',type:'food',rarity:'common',price:25,full:15},
 {id:'chicken',name:'鸡胸肉',icon:'🍗',type:'food',rarity:'uncommon',price:55,full:28},
 {id:'salmon',name:'三文鱼餐',icon:'🍣',type:'food',rarity:'rare',price:110,full:45},
 {id:'steak',name:'豪华牛排',icon:'🥩',type:'food',rarity:'epic',price:220,full:70},
 {id:'bed',name:'软垫狗窝',icon:'🧺',type:'decor',room:'inside',rarity:'common',price:90},
 {id:'sofa',name:'奶油沙发',icon:'🛋️',type:'decor',room:'inside',rarity:'rare',price:260},
 {id:'castle',name:'城堡狗窝',icon:'🏰',type:'decor',room:'inside',rarity:'legendary',price:720},
 {id:'tree',name:'院子小树',icon:'🌳',type:'decor',room:'outside',rarity:'common',price:120},
 {id:'fountain',name:'骨头喷泉',icon:'⛲',type:'decor',room:'outside',rarity:'epic',price:420},
 {id:'pool',name:'狗狗泳池',icon:'🏊',type:'decor',room:'outside',rarity:'legendary',price:880}
];
function fresh(){return{homeCoins:100,unlocked:[0,1,2],inventory:{kibble:2},placed:{inside:[],outside:[]},pet:0,room:'inside',petStats:{},bestLayer:0}}
let state=loadSlot(currentSlot);
function key(){return'dogStackRogue31_slot_'+currentSlot}
function loadSlot(n){try{return JSON.parse(localStorage.getItem('dogStackRogue31_slot_'+n))||fresh()}catch(e){return fresh()}}
function save(){localStorage.setItem(key(),JSON.stringify(state));updatePersistentUI()}
function stat(i){return state.petStats[i]||(state.petStats[i]={full:70,mood:70})}
function toast(t){let e=$('#toast');e.textContent=t;e.style.opacity=1;e.style.transform='translateX(-50%) translateY(0)';clearTimeout(toast.t);toast.t=setTimeout(()=>{e.style.opacity=0;e.style.transform='translateX(-50%) translateY(12px)'},1200)}
function show(id){$$('.screen').forEach(e=>e.classList.remove('active'));$(id).classList.add('active');setTimeout(resize,30)}
function rarityName(r){return({common:'普通',uncommon:'优秀',rare:'稀有',epic:'史诗',legendary:'传说'})[r]}
function updatePersistentUI(){$('#menuHomeCoins').textContent=$('#homeCoins').textContent=state.homeCoins;$('#menuUnlocked').textContent=state.unlocked.length;$$('.slotBtn').forEach(b=>{let s=loadSlot(+b.dataset.slot);b.querySelector('span').textContent=(+b.dataset.slot===currentSlot?'当前':(localStorage.getItem('dogStackRogue31_slot_'+b.dataset.slot)?'已有档':'新档'));b.classList.toggle('active',+b.dataset.slot===currentSlot)})}
updatePersistentUI();

let audio=null,musicOn=true,homeMusicOn=true,musicTimer=null,homeTimer=null,step=0;
function ensureAudio(){try{audio ||= new (window.AudioContext||window.webkitAudioContext)()}catch(e){}}
function tone(freq,dur=.16,type='sine',vol=.018,delay=0){if(!audio)return;let o=audio.createOscillator(),g=audio.createGain(),now=audio.currentTime+delay;o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,now);g.gain.exponentialRampToValueAtTime(.0001,now+dur);o.connect(g);g.connect(audio.destination);o.start(now);o.stop(now+dur)}
function activateAudio(){ensureAudio();audio&&audio.resume()}
function startRunMusic(){clearInterval(musicTimer);if(!musicOn)return;activateAudio();let notes=[261.6,329.6,392,523.2,392,329.6,293.7,349.2,440,587.3,440,349.2];musicTimer=setInterval(()=>{if(!run||paused||!$('#run').classList.contains('active'))return;let n=notes[step++%notes.length];tone(n,.42,'triangle',.011);if(step%4===1)tone(n/2,.55,'sine',.006)},360)}
function startHomeMusic(){clearInterval(homeTimer);if(!homeMusicOn)return;activateAudio();let notes=[220,277.2,329.6,277.2,246.9,293.7,370,293.7];homeTimer=setInterval(()=>{if(!$('#home').classList.contains('active'))return;let n=notes[step++%notes.length];tone(n,.65,'sine',.008)},520)}
document.addEventListener('pointerdown',activateAudio,{once:true});

let run=null;
const mapRows=[[{type:'battle',icon:'🐾',name:'普通关'}],[{type:'battle',icon:'🐾',name:'普通关'},{type:'event',icon:'❓',name:'事件'}],[{type:'shop',icon:'🛒',name:'商店'},{type:'elite',icon:'⚔️',name:'精英关'}],[{type:'battle',icon:'🐾',name:'普通关'},{type:'treasure',icon:'🎁',name:'宝箱'}],[{type:'boss',icon:'👑',name:'街区首领'}]];
function startRun(){activateAudio();run={layer:0,row:0,coins:35,pendingHome:0,traits:{},deck:[0,0,0,1,1,2],battle:null};buildMap();updateRunUI();show('#run');startRunMusic()}
function buildMap(){let p=$('#path');p.innerHTML='';mapRows.forEach((row,ri)=>{let r=document.createElement('div');r.className='row';row.forEach(n=>{let b=document.createElement('button');b.className='node';if(ri<run.row)b.classList.add('done');if(ri>run.row)b.classList.add('lock');if(ri===run.row)b.classList.add('current');b.innerHTML=`<span>${n.icon}</span>${n.name}`;b.onclick=()=>{if(ri===run.row)enterNode(n)};r.appendChild(b)});p.appendChild(r)})}
function enterNode(n){if(['battle','elite','boss'].includes(n.type))startBattle(n.type);else if(n.type==='shop')openRunShop();else if(n.type==='event')openEvent();else openTreasure()}
function completeNode(){run.row++;run.layer++;run.pendingHome+=[0,45,80,130,200,350][Math.min(5,run.layer)];state.bestLayer=Math.max(state.bestLayer,run.layer);if(run.row>=mapRows.length){finishRun(true);return}buildMap();updateRunUI();$('#mapView').classList.add('active');$('#battleView').classList.remove('active')}
function finishRun(win){state.homeCoins+=run.pendingHome;save();$('#resultTitle').textContent=win?'章节完成！':'冒险结束';$('#resultText').innerHTML=`到达第 ${run.layer} 层<br>获得永久狗币 <b>${run.pendingHome}</b> 🏡`;$('#resultModal').style.display='flex';$('#resultContinue').onclick=()=>{$('#resultModal').style.display='none';run=null;clearInterval(musicTimer);show('#menu')}}

$$('.homeTabs button').forEach(b=>b.onclick=()=>{$$('.homeTabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active');state.room=b.dataset.room;save()});

$$('.slotBtn').forEach(b=>b.onclick=()=>{currentSlot=+b.dataset.slot;state=loadSlot(currentSlot);normalizePlaced();save();toast('已切换到档位 '+currentSlot)});

function frame(t){let dt=Math.min(.025,(t-last)/1000);last=t;physics(dt);drawBattle();petTime+=.04;drawRoom();requestAnimationFrame(frame)}
resize();requestAnimationFrame(frame);
setInterval(()=>{let st=stat(state.pet);st.full=Math.max(0,st.full-.5);if(st.full<25)st.mood=Math.max(0,st.mood-.3);save();updatePetUI()},60000);
})();
</script>
</body>
