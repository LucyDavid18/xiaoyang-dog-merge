<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#f6d9e4">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>狗狗叠叠乐 3.0</title>
<style>
:root{
 --ink:#5b443c;--cream:#fff8e8;--pink:#f6cfdd;--rose:#e98ca7;--green:#9ccca8;--gold:#e9b74c;
 --blue:#9fc7dd;--purple:#b89bd5;--card:#fffdf8;--shadow:rgba(73,49,42,.20)
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;overscroll-behavior:none;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#f9dbe6,#fff0d7);color:var(--ink)}
button{font:inherit;color:inherit;border:0}
.screen{position:fixed;inset:0;display:none}
.screen.active{display:flex}
#menu{align-items:center;justify-content:center;padding:24px;background:
 radial-gradient(circle at 20% 15%,#fff8 0 7%,transparent 8%),
 radial-gradient(circle at 80% 22%,#fff7 0 9%,transparent 10%),
 linear-gradient(180deg,#f7d2df,#ffeccf)}
.menuCard{width:min(430px,94vw);background:#fffaf1;border:4px solid white;border-radius:30px;padding:24px;box-shadow:0 18px 55px #0003;text-align:center}
.logo{font-size:34px;font-weight:900;text-shadow:0 3px white}.tag{font-size:12px;opacity:.68;margin:6px 0 18px}
.currencyRow{display:flex;gap:8px;justify-content:center;margin-bottom:18px}.currency{background:white;border-radius:15px;padding:8px 12px;box-shadow:0 4px 12px var(--shadow);font-size:12px}
.menuBtn{width:100%;padding:14px;border-radius:18px;margin:7px 0;background:white;box-shadow:0 5px 15px var(--shadow);font-weight:800}
.menuBtn.primary{background:linear-gradient(135deg,#f5a8be,#f0c97d);color:#fff;text-shadow:0 1px #0002}
.menuBtn.home{background:linear-gradient(135deg,#a9d7b5,#9fcce2);color:#fff}
.tiny{font-size:10px;opacity:.65}
.topbar{height:74px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:max(8px,env(safe-area-inset-top)) 10px 8px;background:#fff9;backdrop-filter:blur(8px);box-shadow:0 4px 15px #0001;z-index:10}
.topbar h2{margin:0;font-size:20px}.pill{background:white;border-radius:14px;padding:8px 10px;box-shadow:0 3px 10px var(--shadow);font-size:11px}
.back{background:white;border-radius:14px;padding:9px 11px;box-shadow:0 3px 10px var(--shadow);font-weight:700}
#run{flex-direction:column}
.runBody{flex:1;min-height:0;position:relative}
#mapView,#battleView{position:absolute;inset:0;display:none}
#mapView.active,#battleView.active{display:block}
.mapWrap{height:100%;overflow:auto;padding:16px 14px 26px}
.mapTitle{text-align:center;font-weight:900;font-size:18px;margin-bottom:6px}.mapSub{text-align:center;font-size:11px;opacity:.65;margin-bottom:18px}
.path{display:flex;flex-direction:column;gap:16px;align-items:center}
.row{width:100%;display:flex;justify-content:space-around;position:relative}
.row:before{content:"";position:absolute;left:50%;top:-18px;width:2px;height:18px;background:#d6b9a6}
.node{width:80px;height:80px;border-radius:24px;background:white;border:3px solid #fff;box-shadow:0 7px 18px var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.node span{font-size:28px}.node.lock{opacity:.4;filter:grayscale(1)}.node.done{background:#e6f5e9}.node.current{outline:4px solid #f1a0b7}
#battleView{padding:7px 9px max(7px,env(safe-area-inset-bottom));background:linear-gradient(180deg,#f4d3df,#fff1d5)}
.battleGrid{height:100%;display:flex;flex-direction:column}
.hud{height:64px;display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding-bottom:6px}
.hud div{background:#fff9;border:2px solid white;border-radius:14px;text-align:center;padding:6px 3px;box-shadow:0 4px 12px var(--shadow);font-size:9px}
.hud b{display:block;font-size:15px}
#stage{position:relative;flex:1;min-height:0;border:4px solid white;border-radius:26px 26px 17px 17px;overflow:hidden;box-shadow:0 12px 25px var(--shadow),inset 0 0 0 2px #d9b79b;background:repeating-linear-gradient(45deg,#f8e5cd 0 22px,#fff0da 22px 44px)}
canvas{display:block;width:100%;height:100%}
#danger{position:absolute;top:92px;left:0;right:0;border-top:2px dashed #d76d85}#danger:after{content:"危险线";position:absolute;right:7px;top:-17px;font-size:9px;background:#fff9;padding:2px 5px;border-radius:7px}
#aim{position:absolute;top:0;height:92px;width:2px;background:linear-gradient(#b67d90,transparent)}
#nextCard{position:absolute;right:8px;top:8px;width:72px;height:67px;background:#fff9;border:2px solid #fff;border-radius:14px;text-align:center;font-size:9px;padding-top:2px;z-index:4}
#nextFace{width:52px;height:45px}
#nodeRule{position:absolute;left:8px;top:8px;z-index:4;background:#fff9;border:2px solid #fff;border-radius:14px;padding:7px 9px;font-size:10px;max-width:180px}
.battleFoot{height:62px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.traits{font-size:9px;line-height:1.35;max-width:65%}.battleBtns{display:flex;gap:6px}.smallBtn{background:white;border-radius:13px;padding:9px;box-shadow:0 4px 12px var(--shadow);font-weight:700}
#home{flex-direction:column;background:linear-gradient(180deg,#dff3ed,#f8efd9)}
.homeTabs{height:48px;display:flex;gap:7px;padding:7px 10px}.homeTabs button{flex:1;border-radius:14px;background:#fff9;box-shadow:0 3px 10px #0001;font-size:11px;font-weight:700}.homeTabs button.active{background:#fff}
.homeScene{position:relative;flex:1;min-height:0;overflow:hidden}
#petCanvas{position:absolute;inset:0}
.homeOverlay{position:absolute;left:8px;right:8px;top:8px;display:flex;justify-content:space-between;pointer-events:none}
.homeOverlay>*{pointer-events:auto}
.petCard{background:#fff9;border:2px solid #fff;border-radius:15px;padding:8px 10px;box-shadow:0 4px 12px #0002;font-size:10px}
.homeActions{height:78px;display:flex;gap:7px;overflow-x:auto;padding:8px 10px max(8px,env(safe-area-inset-bottom))}
.homeAction{min-width:78px;background:white;border-radius:15px;box-shadow:0 4px 12px #0001;font-size:10px;padding:7px}.homeAction span{display:block;font-size:23px}
.modal{position:fixed;inset:0;z-index:50;background:#49383388;display:none;align-items:center;justify-content:center;padding:17px}
.panel{width:min(440px,96vw);max-height:88dvh;overflow:auto;background:#fffaf1;border:4px solid white;border-radius:27px;padding:18px;box-shadow:0 20px 55px #0004;text-align:center}
.panel h2{margin:2px 0 7px}.panel p{font-size:11px;line-height:1.45}
.cards{display:grid;gap:9px}.card{background:white;border:2px solid #ead8ca;border-radius:17px;padding:10px;text-align:left;box-shadow:0 3px 9px #0001}.card b{display:block}.card small{font-size:10px;opacity:.7}
.shopGrid,.inventoryGrid,.dogGrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.shopItem,.invItem,.dogItem{background:white;border:2px solid #ead8ca;border-radius:17px;padding:8px;text-align:left;box-shadow:0 4px 10px #0001}
.shopArt{height:72px;border-radius:12px;background:linear-gradient(145deg,#f9dce8,#f8ebcd);display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:6px}
.rarity{font-size:9px;border-radius:7px;padding:2px 5px;display:inline-block;margin-top:3px}
.common{background:#eee}.uncommon{background:#dff2df}.rare{background:#dfeeff}.epic{background:#eee2fa}.legendary{background:#ffe8b2}
.wide{width:100%;padding:12px;border-radius:15px;background:white;box-shadow:0 4px 12px #0001;font-weight:800;margin-top:8px}
#toast{position:fixed;z-index:80;left:50%;bottom:96px;transform:translateX(-50%) translateY(12px);background:#59443d;color:white;border-radius:13px;padding:8px 13px;font-size:11px;opacity:0;transition:.2s}
</style>
</head>
<body>

<section id="menu" class="screen active">
 <div class="menuCard">
  <div class="logo">🐾 狗狗叠叠乐</div>
  <div class="tag">肉鸽闯关 × 狗狗之家 × 长期收藏</div>
  <div class="currencyRow">
   <div class="currency">🏡 狗币 <b id="menuHomeCoins">0</b></div>
   <div class="currency">🐶 已解锁 <b id="menuUnlocked">3</b></div>
  </div>
  <button class="menuBtn primary" id="startRun">开始冒险</button>
  <button class="menuBtn home" id="openHome">进入狗狗之家</button>
  <button class="menuBtn" id="openCollection">犬种图鉴</button>
  <div class="tiny">数据会保存在当前手机浏览器中</div>
 </div>
</section>

<section id="run" class="screen">
 <div class="topbar">
  <button class="back" id="leaveRun">← 主菜单</button>
  <h2>冒险路线</h2>
  <div class="pill">🪙 <b id="runCoins">0</b>　🏡 <b id="pendingHome">0</b></div>
 </div>
 <div class="runBody">
  <div id="mapView" class="active">
   <div class="mapWrap">
    <div class="mapTitle">第一章 · 暖阳街区</div>
    <div class="mapSub">每层只能选择一个节点，商店不能随时进入</div>
    <div id="path" class="path"></div>
   </div>
  </div>
  <div id="battleView">
   <div class="battleGrid">
    <div class="hud">
     <div><b id="battleBones">0</b>骨头</div><div><b id="battleGoal">0</b>目标</div><div><b id="battleDrops">0</b>剩余</div><div><b id="battleCoins">0</b>金币</div>
    </div>
    <div id="stage">
     <div id="nodeRule"></div><div id="nextCard">下一个<br><canvas id="nextFace" width="104" height="90"></canvas></div>
     <div id="danger"></div><div id="aim"></div><canvas id="game"></canvas>
    </div>
    <div class="battleFoot"><div class="traits" id="traitText">暂无特性</div><div class="battleBtns"><button class="smallBtn" id="musicBtn">🎵</button></div></div>
   </div>
  </div>
 </div>
</section>

<section id="home" class="screen">
 <div class="topbar">
  <button class="back" id="leaveHome">← 主菜单</button>
  <h2>狗狗之家</h2>
  <div class="pill">🏡 <b id="homeCoins">0</b></div>
 </div>
 <div class="homeTabs"><button class="active" data-room="inside">室内</button><button data-room="outside">室外</button></div>
 <div class="homeScene">
  <canvas id="petCanvas"></canvas>
  <div class="homeOverlay">
   <div class="petCard"><b id="petName">奶狗</b><br>心情 <span id="petMood">😊</span>　饱腹 <span id="petFull">70</span></div>
   <button class="petCard" id="switchPet">换狗</button>
  </div>
 </div>
 <div class="homeActions">
  <button class="homeAction" id="feedBtn"><span>🍖</span>喂食</button>
  <button class="homeAction" id="decorateBtn"><span>🛋️</span>装修</button>
  <button class="homeAction" id="inventoryBtn"><span>🎒</span>仓库</button>
  <button class="homeAction" id="petBtn"><span>🤲</span>摸摸</button>
 </div>
</section>

<div class="modal" id="choiceModal"><div class="panel"><h2 id="choiceTitle"></h2><p id="choiceText"></p><div id="choiceList" class="cards"></div></div></div>
<div class="modal" id="shopModal"><div class="panel"><h2>旅途商店</h2><p>只有进入商店节点才能购买。离开后本层商店关闭。</p><div id="shopGrid" class="shopGrid"></div><button class="wide" id="closeShop">离开商店</button></div></div>
<div class="modal" id="homeShopModal"><div class="panel"><h2 id="homeShopTitle">狗狗用品</h2><div id="homeShopGrid" class="inventoryGrid"></div><button class="wide closeModal">关闭</button></div></div>
<div class="modal" id="collectionModal"><div class="panel"><h2>犬种图鉴</h2><p>闯关过程中解锁的新犬种会永久加入狗狗之家。</p><div id="dogGrid" class="dogGrid"></div><button class="wide closeModal">关闭</button></div></div>
<div class="modal" id="resultModal"><div class="panel"><h2 id="resultTitle">结算</h2><p id="resultText"></p><button class="wide" id="resultContinue">继续</button></div></div>
<div id="toast"></div>

<script>
(()=>{
'use strict';
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const saveKey='dogStackRogue3';
const DOGS=[
 {name:'奶狗',fur:'#f3d2aa',ear:'#c88f5d',kind:'round',rarity:'common'},
 {name:'柯基',fur:'#e99c51',ear:'#a45e36',kind:'long',rarity:'common'},
 {name:'柴犬',fur:'#d98549',ear:'#95502f',kind:'fox',rarity:'common'},
 {name:'比熊',fur:'#fff9ef',ear:'#dfd1c4',kind:'cloud',rarity:'uncommon'},
 {name:'法斗',fur:'#aaa19c',ear:'#5f5855',kind:'square',rarity:'uncommon'},
 {name:'金毛',fur:'#dfad56',ear:'#a66b31',kind:'golden',rarity:'uncommon'},
 {name:'哈士奇',fur:'#9aa7b4',ear:'#576674',kind:'husky',rarity:'rare'},
 {name:'萨摩耶',fur:'#fffdf7',ear:'#ddd1c8',kind:'samoyed',rarity:'rare'},
 {name:'阿拉斯加',fur:'#686b70',ear:'#363a41',kind:'malamute',rarity:'rare'},
 {name:'边牧',fur:'#393c42',ear:'#22252a',kind:'collie',rarity:'rare'},
 {name:'拉布拉多',fur:'#d4a05e',ear:'#855a35',kind:'lab',rarity:'uncommon'},
 {name:'博美',fur:'#e8b16d',ear:'#a66e3d',kind:'pomeranian',rarity:'rare'},
 {name:'巴哥',fur:'#c8ae86',ear:'#4d443e',kind:'pug',rarity:'uncommon'},
 {name:'秋田犬',fur:'#d8a05e',ear:'#8f5b34',kind:'akita',rarity:'epic'},
 {name:'伯恩山',fur:'#473c39',ear:'#221f1e',kind:'bernese',rarity:'epic'},
 {name:'大丹犬',fur:'#8c8f96',ear:'#45484d',kind:'greatdane',rarity:'epic'},
 {name:'月光萨摩耶',fur:'#dce9ff',ear:'#9eb7da',kind:'moon',rarity:'legendary'},
 {name:'皇冠柯基',fur:'#f0a45c',ear:'#9e5631',kind:'royalcorgi',rarity:'legendary'}
];
const ITEMS=[
 {id:'kibble',name:'基础狗粮',icon:'🥣',type:'food',rarity:'common',price:25,full:15},
 {id:'chicken',name:'鸡胸肉',icon:'🍗',type:'food',rarity:'uncommon',price:55,full:28},
 {id:'salmon',name:'三文鱼餐',icon:'🍣',type:'food',rarity:'rare',price:110,full:45},
 {id:'steak',name:'豪华牛排',icon:'🥩',type:'food',rarity:'epic',price:220,full:70},
 {id:'bed',name:'软垫狗窝',icon:'🧺',type:'decor',room:'inside',rarity:'common',price:90},
 {id:'sofa',name:'奶油沙发',icon:'🛋️',type:'decor',room:'inside',rarity:'rare',price:260},
 {id:'castle',name:'城堡狗窝',icon:'🏰',type:'decor',room:'inside',rarity:'legendary',price:720},
 {id:'tree',name:'院子小树',icon:'🌳',type:'decor',room:'outside',rarity:'common',price:120},
 {id:'fountain',name:'骨头喷泉',icon:'⛲',type:'decor',room:'outside',rarity:'epic',price:420},
 {id:'pool',name:'狗狗泳池',icon:'🏊',type:'decor',room:'outside',rarity:'legendary',price:880}
];
let state=JSON.parse(localStorage.getItem(saveKey)||'null')||{
 homeCoins:100,unlocked:[0,1,2],inventory:{kibble:2},placed:{inside:[],outside:[]},pet:0,room:'inside',
 petStats:{},bestLayer:0
};
function save(){localStorage.setItem(saveKey,JSON.stringify(state));updatePersistentUI()}
function stat(i){return state.petStats[i]||(state.petStats[i]={full:70,mood:70})}
function toast(t){let e=$('#toast');e.textContent=t;e.style.opacity=1;e.style.transform='translateX(-50%) translateY(0)';clearTimeout(toast.t);toast.t=setTimeout(()=>{e.style.opacity=0;e.style.transform='translateX(-50%) translateY(12px)'},1200)}
function show(id){$$('.screen').forEach(e=>e.classList.remove('active'));$(id).classList.add('active')}
function updatePersistentUI(){
 $('#menuHomeCoins').textContent=$('#homeCoins').textContent=state.homeCoins;
 $('#menuUnlocked').textContent=state.unlocked.length;
}
function rarityName(r){return({common:'普通',uncommon:'优秀',rare:'稀有',epic:'史诗',legendary:'传说'})[r]}
function rarityClass(r){return r}
updatePersistentUI();

let run=null;
const mapRows=[
 [{type:'battle',icon:'🐾',name:'普通关'}],
 [{type:'battle',icon:'🐾',name:'普通关'},{type:'event',icon:'❓',name:'事件'}],
 [{type:'shop',icon:'🛒',name:'商店'},{type:'elite',icon:'⚔️',name:'精英关'}],
 [{type:'battle',icon:'🐾',name:'普通关'},{type:'treasure',icon:'🎁',name:'宝箱'}],
 [{type:'boss',icon:'👑',name:'街区首领'}]
];
function startRun(){
 run={layer:0,row:0,coins:35,pendingHome:0,traits:{},deck:[0,0,0,1,1,2],chosen:[],battle:null};
 buildMap();updateRunUI();show('#run')
}
function buildMap(){
 const path=$('#path');path.innerHTML='';
 mapRows.forEach((row,ri)=>{
  const r=document.createElement('div');r.className='row';
  row.forEach((n,ni)=>{
   let b=document.createElement('button');b.className='node';
   if(ri<run.row)b.classList.add('done');
   if(ri>run.row)b.classList.add('lock');
   if(ri===run.row)b.classList.add('current');
   b.innerHTML=`<span>${n.icon}</span>${n.name}`;
   b.onclick=()=>{if(ri!==run.row)return;enterNode(n)};
   r.appendChild(b)
  });path.appendChild(r)
 })
}
function enterNode(node){
 if(node.type==='battle'||node.type==='elite'||node.type==='boss')startBattle(node.type);
 else if(node.type==='shop')openRunShop();
 else if(node.type==='event')openEvent();
 else if(node.type==='treasure')openTreasure()
}
function completeNode(){
 run.row++;run.layer++;run.pendingHome += [0,45,80,130,200,350][Math.min(5,run.layer)];
 state.bestLayer=Math.max(state.bestLayer,run.layer);
 if(run.row>=mapRows.length){finishRun(true);return}
 buildMap();updateRunUI();$('#mapView').classList.add('active');$('#battleView').classList.remove('active')
}
function finishRun(win){
 state.homeCoins+=run.pendingHome;save();
 $('#resultTitle').textContent=win?'章节完成！':'冒险结束';
 $('#resultText').innerHTML=`到达第 ${run.layer} 层<br>获得永久狗币 <b>${run.pendingHome}</b> 🏡`;
 $('#resultModal').style.display='flex';
 $('#resultContinue').onclick=()=>{$('#resultModal').style.display='none';run=null;show('#menu')}
}
function updateRunUI(){
 $('#runCoins').textContent=run?.coins||0;$('#pendingHome').textContent=run?.pendingHome||0;
 $('#battleCoins').textContent=run?.coins||0
}
function openEvent(){
 const events=[
  {title:'流浪狗',text:'路边有一只小狗跟着你。',choices:[
   ['收养它（解锁随机犬种）',()=>unlockRandom()],
   ['给它食物（-20金币，获得迷你狗粮）',()=>{if(run.coins>=20){run.coins-=20;run.traits.tiny=(run.traits.tiny||0)+1}}],
   ['挥手告别',()=>{}]
  ]},
  {title:'狗狗公园',text:'这里的狗都非常活跃。',choices:[
   ['一起玩（获得25金币，但弹力增加）',()=>{run.coins+=25;run.traits.bouncy=(run.traits.bouncy||0)+1}],
   ['安静休息（以后狗体积缩小）',()=>{run.traits.tiny=(run.traits.tiny||0)+1}]
  ]}
 ];
 let ev=events[(Math.random()*events.length)|0];openChoices(ev.title,ev.text,ev.choices,completeNode)
}
function openTreasure(){
 let choices=[
  ['黄金项圈','合成金币收益提高',()=>run.traits.rich=(run.traits.rich||0)+1],
  ['迷你狗粮','所有新狗体型缩小',()=>run.traits.tiny=(run.traits.tiny||0)+1],
  ['领养券','随机解锁一种新狗',()=>unlockRandom()]
 ];
 openChoices('宝箱','选择一件永久带到本局结束的宝物。',choices.map(x=>[x[0]+'：'+x[1],x[2]]),completeNode)
}
function unlockRandom(){
 let pool=DOGS.map((_,i)=>i).filter(i=>!state.unlocked.includes(i));
 if(!pool.length){run.coins+=60;toast('犬种已全部解锁，改为获得60金币');return}
 let id=pool[(Math.random()*pool.length)|0];state.unlocked.push(id);save();toast('解锁 '+DOGS[id].name)
}
function openRunShop(){
 const stock=[
  {name:'迷你狗粮',icon:'🥣',price:45,desc:'所有新狗缩小6%',buy:()=>run.traits.tiny=(run.traits.tiny||0)+1},
  {name:'幸运项圈',icon:'🎀',price:70,desc:'合成金币增加40%',buy:()=>run.traits.rich=(run.traits.rich||0)+1},
  {name:'领养犬种',icon:'🐶',price:95,desc:'随机解锁一种新犬种',buy:unlockRandom},
  {name:'精简牌组',icon:'✂️',price:55,desc:'移除一张最低级狗',buy:()=>{if(run.deck.length>3)run.deck.splice(run.deck.indexOf(Math.min(...run.deck)),1)}}
 ];
 let g=$('#shopGrid');g.innerHTML='';
 stock.forEach(it=>{let b=document.createElement('button');b.className='shopItem';b.innerHTML=`<div class="shopArt">${it.icon}</div><b>${it.name}</b><small>${it.desc}</small><div>${it.price} 🪙</div>`;b.onclick=()=>{if(run.coins<it.price){toast('金币不够');return}run.coins-=it.price;it.buy();b.disabled=true;b.style.opacity=.4;updateRunUI()};g.appendChild(b)});
 $('#shopModal').style.display='flex'
}
$('#closeShop').onclick=()=>{$('#shopModal').style.display='none';completeNode()};

function openChoices(title,text,choices,after){
 $('#choiceTitle').textContent=title;$('#choiceText').textContent=text;let box=$('#choiceList');box.innerHTML='';
 choices.forEach(c=>{let b=document.createElement('button');b.className='card';b.innerHTML=`<b>${c[0]}</b>`;b.onclick=()=>{c[1]();$('#choiceModal').style.display='none';updateRunUI();after&&after()};box.appendChild(b)});
 $('#choiceModal').style.display='flex'
}

const canvas=$('#game'),ctx=canvas.getContext('2d'),nextCtx=$('#nextFace').getContext('2d');
let W=0,H=0,DPR=1,last=performance.now(),dropX=180,drag=false,paused=true,gameOver=false,dangerTime=0;
function resize(){
 let r=canvas.getBoundingClientRect();DPR=Math.min(devicePixelRatio||1,2);W=r.width;H=r.height;canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
 let pr=$('#petCanvas').getBoundingClientRect();petCanvas.width=pr.width*DPR;petCanvas.height=pr.height*DPR;petCtx.setTransform(DPR,0,0,DPR,0,0)
}
new ResizeObserver(resize).observe(document.body);

function shapeParts(type,size=1){
 const k=DOGS[type].kind;
 if(['long','golden','lab','greatdane'].includes(k))return [[-.28,0,.31],[0,0,.34],[.28,0,.31]];
 if(['cloud','samoyed','pomeranian','moon'].includes(k))return [[-.24,-.08,.28],[0,-.16,.30],[.24,-.08,.28],[-.17,.19,.28],[.17,.19,.28]];
 if(['square','pug','bernese','malamute'].includes(k))return [[-.22,-.16,.31],[.22,-.16,.31],[-.22,.18,.31],[.22,.18,.31]];
 return [[0,-.18,.31],[-.23,.09,.30],[.23,.09,.30],[0,.24,.28]]
}
function dimensions(t,scale=1){
 let k=DOGS[t].kind;
 let wh=['long','golden','lab'].includes(k)?[64,38]:['greatdane'].includes(k)?[74,52]:['square','pug'].includes(k)?[54,50]:['samoyed','moon'].includes(k)?[70,66]:['malamute','bernese'].includes(k)?[82,66]:[48,46];
 return [wh[0]*scale,wh[1]*scale]
}
function newBody(type,x,y){
 let sc=Math.max(.72,1-(run.traits.tiny||0)*.06),[w,h]=dimensions(type,sc);
 return {type,x,y,vx:0,vy:0,rot:0,av:0,w,h,mass:(w*h)/1800,born:performance.now()}
}
function parts(b){
 let c=Math.cos(b.rot),s=Math.sin(b.rot),m=Math.min(b.w,b.h);
 return shapeParts(b.type).map(p=>{let lx=p[0]*b.w,ly=p[1]*b.h;return{x:b.x+lx*c-ly*s,y:b.y+lx*s+ly*c,r:p[2]*m}})
}
function drawDog(c,x,y,size,t,rot=0,fullBody=false,emotion='happy'){
 const d=DOGS[t],k=d.kind;c.save();c.translate(x,y);c.rotate(rot);let sc=size/70;c.scale(sc,sc);
 c.shadowColor='#0002';c.shadowBlur=8;c.shadowOffsetY=4;
 if(fullBody){
  c.fillStyle=d.fur;c.beginPath();c.ellipse(0,8,25,18,0,0,7);c.fill();
  c.fillStyle=d.ear;c.beginPath();c.ellipse(-18,20,7,15,.1,0,7);c.ellipse(18,20,7,15,-.1,0,7);c.fill();
  c.strokeStyle=d.ear;c.lineWidth=6;c.beginPath();c.arc(25,7,13,-1.1,.9);c.stroke()
 }
 c.fillStyle=d.ear;
 if(['golden','lab'].includes(k)){c.beginPath();c.ellipse(-22,-3,10,22,-.25,0,7);c.ellipse(22,-3,10,22,.25,0,7);c.fill()}
 else{c.beginPath();c.moveTo(-24,-9);c.lineTo(-14,-34);c.lineTo(-4,-12);c.moveTo(24,-9);c.lineTo(14,-34);c.lineTo(4,-12);c.fill()}
 c.fillStyle=d.fur;
 if(['long','royalcorgi'].includes(k)){c.beginPath();c.roundRect(-34,-19,68,40,18);c.fill()}
 else if(['cloud','samoyed','pomeranian','moon'].includes(k)){for(let i=0;i<10;i++){let a=i*Math.PI/5;c.beginPath();c.arc(Math.cos(a)*23,Math.sin(a)*20,14,0,7);c.fill()}c.beginPath();c.arc(0,0,25,0,7);c.fill()}
 else if(['square','pug'].includes(k)){c.beginPath();c.roundRect(-29,-25,58,52,15);c.fill()}
 else if(['greatdane','malamute','bernese'].includes(k)){c.beginPath();c.roundRect(-36,-27,72,56,18);c.fill()}
 else{c.beginPath();c.moveTo(0,-28);c.lineTo(28,-5);c.lineTo(18,28);c.lineTo(-18,28);c.lineTo(-28,-5);c.closePath();c.fill()}
 c.fillStyle='#fff7e9';c.beginPath();c.ellipse(0,9,17,13,0,0,7);c.fill();
 c.fillStyle='#3f302c';c.beginPath();c.arc(-8,-4,2.7,0,7);c.arc(8,-4,2.7,0,7);c.fill();c.beginPath();c.ellipse(0,7,5,3.4,0,0,7);c.fill();
 c.strokeStyle='#65483f';c.lineWidth=2;c.beginPath();c.moveTo(0,10);if(emotion==='sad'){c.quadraticCurveTo(-7,7,-12,13);c.moveTo(0,10);c.quadraticCurveTo(7,7,12,13)}else{c.quadraticCurveTo(-7,18,-13,13);c.moveTo(0,10);c.quadraticCurveTo(7,18,13,13)}c.stroke();
 if(k==='husky'||k==='malamute'){c.strokeStyle='#fff';c.lineWidth=6;c.beginPath();c.moveTo(-20,-9);c.lineTo(-7,-14);c.moveTo(20,-9);c.lineTo(7,-14);c.stroke()}
 if(k==='royalcorgi'){c.fillStyle='#efc54c';c.beginPath();c.moveTo(-18,-24);c.lineTo(-10,-43);c.lineTo(0,-28);c.lineTo(10,-43);c.lineTo(19,-24);c.closePath();c.fill()}
 c.restore()
}

function startBattle(kind){
 const mult=kind==='elite'?1.6:kind==='boss'?2.2:1;
 run.battle={kind,bodies:[],bones:0,goal:Math.round((115+run.layer*55)*mult),drops:12+(run.layer|0),current:pickDeck(),next:pickDeck()};
 paused=false;gameOver=false;dangerTime=0;$('#mapView').classList.remove('active');$('#battleView').classList.add('active');
 $('#nodeRule').innerHTML=(kind==='elite'?'精英关：高目标，高奖励':kind==='boss'?'首领：场地更窄':'普通关')+'<br>完成目标后才能前进';
 updateBattleUI()
}
function pickDeck(){return run.deck[(Math.random()*run.deck.length)|0]}
function updateBattleUI(){
 let b=run.battle;$('#battleBones').textContent=b.bones;$('#battleGoal').textContent=b.goal;$('#battleDrops').textContent=b.drops;updateRunUI();
 drawDog(nextCtx,52,45,48,b.next,0,false)
}
function deepest(a,b){let best=null;for(let pa of parts(a))for(let pb of parts(b)){let dx=pb.x-pa.x,dy=pb.y-pa.y,d=Math.hypot(dx,dy)||.001,p=pa.r+pb.r-d;if(p>0&&(!best||p>best.p))best={dx,dy,d,p}}return best}
function solve(a,b,c){
 let nx=c.dx/c.d,ny=c.dy/c.d,ia=1/a.mass,ib=1/b.mass,sum=ia+ib,corr=Math.max(0,c.p-.3)*.72/sum;
 a.x-=nx*corr*ia;a.y-=ny*corr*ia;b.x+=nx*corr*ib;b.y+=ny*corr*ib;
 let rv=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;if(rv<0){let e=.22+(run.traits.bouncy||0)*.08,j=Math.min(250,-(1+e)*rv/sum);a.vx-=j*nx*ia;a.vy-=j*ny*ia;b.vx+=j*nx*ib;b.vy+=j*ny*ib}
}
function merge(a,b){
 let t=a.type,nb=run.battle.bodies.filter(x=>x!==a&&x!==b);run.battle.bodies=nb;
 let gain=7*(t+1)*(t+1),cash=Math.max(1,Math.round((t+1)*(1+(run.traits.rich||0)*.4)));
 run.battle.bones+=gain;run.coins+=cash;
 if(t<DOGS.length-1){let n=newBody(t+1,(a.x+b.x)/2,(a.y+b.y)/2);n.vy=-60;run.battle.bodies.push(n)}
 updateBattleUI()
}
function physics(dt){
 if(!run?.battle||paused)return;
 let B=run.battle,subs=4,st=dt/subs,left=B.kind==='boss'?18:4,right=B.kind==='boss'?W-18:W-4;
 for(let s=0;s<subs;s++){
  for(let b of B.bodies){
   b.vy+=900*st;b.vx=Math.max(-620,Math.min(620,b.vx));b.vy=Math.max(-680,Math.min(900,b.vy));
   b.x+=b.vx*st;b.y+=b.vy*st;b.rot+=b.av*st;b.av*=.99;
   for(let p of parts(b)){if(p.x-p.r<left){b.x+=left-(p.x-p.r);b.vx=Math.abs(b.vx)*.18}if(p.x+p.r>right){b.x-=(p.x+p.r)-right;b.vx=-Math.abs(b.vx)*.18}if(p.y+p.r>H-3){b.y-=(p.y+p.r)-(H-3);b.vy=-Math.abs(b.vy)*.12;b.vx*=.88}}
  }
  for(let it=0;it<4;it++){let merged=false;outer:for(let i=0;i<B.bodies.length;i++)for(let j=i+1;j<B.bodies.length;j++){let a=B.bodies[i],b=B.bodies[j],c=deepest(a,b);if(!c)continue;if(a.type===b.type&&performance.now()-a.born>120&&performance.now()-b.born>120){merge(a,b);merged=true;break outer}else solve(a,b,c)}if(merged)continue}
 }
 let crowded=B.bodies.some(b=>performance.now()-b.born>1500&&parts(b).some(p=>p.y-p.r<92)&&Math.hypot(b.vx,b.vy)<60);
 dangerTime=crowded?dangerTime+dt:Math.max(0,dangerTime-dt*2);if(dangerTime>2.5)battleEnd(false)
}
function drawBattle(){
 ctx.clearRect(0,0,W,H);if(!run?.battle)return;
 drawDog(ctx,dropX,43,Math.max(...dimensions(run.battle.current)),run.battle.current,0,false);
 run.battle.bodies.forEach(b=>drawDog(ctx,b.x,b.y,Math.max(b.w,b.h),b.type,b.rot,false));
 if(dangerTime){ctx.fillStyle=`rgba(220,70,100,${Math.min(.16,dangerTime*.06)})`;ctx.fillRect(0,0,W,94)}
}
function drop(){
 if(paused||!run?.battle||run.battle.drops<=0)return;
 let t=run.battle.current,n=newBody(t,Math.max(35,Math.min(W-35,dropX)),42);run.battle.bodies.push(n);
 run.battle.current=run.battle.next;run.battle.next=pickDeck();run.battle.drops--;updateBattleUI();
 if(run.battle.drops===0)setTimeout(()=>battleEnd(run.battle.bones>=run.battle.goal),2200)
}
function battleEnd(success){
 if(paused)return;paused=true;let B=run.battle;
 if(success){
  let reward=B.kind==='boss'?100:B.kind==='elite'?55:30;run.coins+=reward;
  openChoices('过关！',`完成目标 ${B.bones}/${B.goal}，获得 ${reward} 金币。选择一项奖励。`,[
   ['迷你狗粮：以后狗缩小',()=>run.traits.tiny=(run.traits.tiny||0)+1],
   ['幸运项圈：合成金币增加',()=>run.traits.rich=(run.traits.rich||0)+1],
   ['解锁犬种：加入狗狗之家',()=>unlockRandom()]
  ],()=>{run.battle=null;completeNode()})
 }else{
  run.battle=null;finishRun(false)
 }
}
function pointerX(e){let r=canvas.getBoundingClientRect(),p=e.touches?e.touches[0]:e;return p.clientX-r.left}
function down(e){if(paused)return;drag=true;move(e);e.preventDefault()}
function move(e){if(!drag)return;dropX=Math.max(35,Math.min(W-35,pointerX(e)));$('#aim').style.left=(dropX-1)+'px';e.preventDefault()}
function up(e){if(!drag)return;drag=false;drop();e.preventDefault()}
canvas.addEventListener('touchstart',down,{passive:false});canvas.addEventListener('touchmove',move,{passive:false});canvas.addEventListener('touchend',up,{passive:false});canvas.addEventListener('mousedown',down);addEventListener('mousemove',move);addEventListener('mouseup',up);

const petCanvas=$('#petCanvas'),petCtx=petCanvas.getContext('2d');
let petPos={x:180,y:280},petDrag=false,petTime=0;
function drawRoom(){
 let c=petCtx,w=petCanvas.clientWidth,h=petCanvas.clientHeight;c.clearRect(0,0,w,h);
 if(state.room==='inside'){
  c.fillStyle='#f5e7d0';c.fillRect(0,0,w,h);c.fillStyle='#d7b18a';for(let y=h*.68;y<h;y+=22){c.fillRect(0,y,w,2)}
  c.fillStyle='#b9d8e8';c.fillRect(w*.12,h*.12,w*.3,h*.27);c.fillStyle='#fff8';c.fillRect(w*.14,h*.14,w*.12,h*.23);
 }else{
  let g=c.createLinearGradient(0,0,0,h);g.addColorStop(0,'#bfe0ef');g.addColorStop(.58,'#dff1d0');g.addColorStop(.59,'#9ccc78');g.addColorStop(1,'#83b566');c.fillStyle=g;c.fillRect(0,0,w,h);
  c.fillStyle='#fff9';c.beginPath();c.arc(w*.8,h*.14,34,0,7);c.fill()
 }
 state.placed[state.room].forEach((id,i)=>{let it=ITEMS.find(x=>x.id===id);if(!it)return;c.font='42px sans-serif';c.fillText(it.icon,30+i*58,h-45-(i%2)*45)});
 let st=stat(state.pet),emotion=st.mood<35?'sad':'happy';
 drawDog(c,petPos.x,petPos.y+Math.sin(petTime)*2,105,state.pet,0,true,emotion)
}
function petLoop(){petTime+=.04;drawRoom();requestAnimationFrame(petLoop)}
petCanvas.addEventListener('touchstart',e=>{petDrag=true;e.preventDefault()},{passive:false});
petCanvas.addEventListener('touchmove',e=>{if(!petDrag)return;let r=petCanvas.getBoundingClientRect(),p=e.touches[0];petPos.x=p.clientX-r.left;petPos.y=p.clientY-r.top;e.preventDefault()},{passive:false});
petCanvas.addEventListener('touchend',()=>petDrag=false,{passive:false});
function updatePetUI(){let st=stat(state.pet);$('#petName').textContent=DOGS[state.pet].name;$('#petMood').textContent=st.mood<35?'😞':st.mood<70?'🙂':'😊';$('#petFull').textContent=Math.round(st.full)}
function enterHome(){show('#home');updatePetUI();resize()}
function choosePet(){
 let box=$('#dogGrid');box.innerHTML='';
 state.unlocked.forEach(i=>{let d=DOGS[i],b=document.createElement('button');b.className='dogItem';b.innerHTML=`<div class="shopArt">🐶</div><b>${d.name}</b><span class="rarity ${rarityClass(d.rarity)}">${rarityName(d.rarity)}</span>`;b.onclick=()=>{state.pet=i;save();updatePetUI();$('#collectionModal').style.display='none'};box.appendChild(b)});
 $('#collectionModal').style.display='flex'
}
function openHomeShop(type){
 $('#homeShopTitle').textContent=type==='food'?'选择食物':'选择装修';let box=$('#homeShopGrid');box.innerHTML='';
 ITEMS.filter(x=>x.type===type&&(type!=='decor'||x.room===state.room)).forEach(it=>{
  let owned=state.inventory[it.id]||0,b=document.createElement('button');b.className='invItem';
  b.innerHTML=`<div class="shopArt">${it.icon}</div><b>${it.name}</b><small>拥有 ${owned}</small><span class="rarity ${it.rarity}">${rarityName(it.rarity)}</span><div>${it.price} 🏡</div>`;
  b.onclick=()=>{if(owned>0)useHomeItem(it);else if(state.homeCoins>=it.price){state.homeCoins-=it.price;state.inventory[it.id]=(state.inventory[it.id]||0)+1;save();toast('购买成功');openHomeShop(type)}else toast('狗币不够')};
  box.appendChild(b)
 });$('#homeShopModal').style.display='flex'
}
function useHomeItem(it){
 if(it.type==='food'){let st=stat(state.pet);st.full=Math.min(100,st.full+it.full);st.mood=Math.min(100,st.mood+8);state.inventory[it.id]--;toast(DOGS[state.pet].name+'吃得很开心')}
 else{state.placed[state.room].push(it.id);state.inventory[it.id]--;toast('已放入'+(state.room==='inside'?'室内':'室外'))}
 save();updatePetUI();openHomeShop(it.type)
}
function renderCollection(){let box=$('#dogGrid');box.innerHTML='';DOGS.forEach((d,i)=>{let unlocked=state.unlocked.includes(i),b=document.createElement('div');b.className='dogItem';b.innerHTML=`<div class="shopArt">${unlocked?'🐶':'❔'}</div><b>${unlocked?d.name:'未解锁犬种'}</b><span class="rarity ${d.rarity}">${rarityName(d.rarity)}</span>`;box.appendChild(b)});$('#collectionModal').style.display='flex'}

$('#startRun').onclick=startRun;$('#openHome').onclick=enterHome;$('#openCollection').onclick=renderCollection;
$('#leaveRun').onclick=()=>{if(run&&run.layer>0){state.homeCoins+=run.pendingHome;save()}run=null;show('#menu')};
$('#leaveHome').onclick=()=>show('#menu');
$('#switchPet').onclick=choosePet;$('#feedBtn').onclick=()=>openHomeShop('food');$('#decorateBtn').onclick=()=>openHomeShop('decor');$('#inventoryBtn').onclick=()=>toast('已拥有 '+Object.values(state.inventory).reduce((a,b)=>a+b,0)+' 件物品');
$('#petBtn').onclick=()=>{let st=stat(state.pet);st.mood=Math.min(100,st.mood+10);save();updatePetUI();toast('摸摸 '+DOGS[state.pet].name)};
$$('.homeTabs button').forEach(b=>b.onclick=()=>{$$('.homeTabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active');state.room=b.dataset.room;save()});
$$('.closeModal').forEach(b=>b.onclick=()=>b.closest('.modal').style.display='none');

function frame(t){let dt=Math.min(.025,(t-last)/1000);last=t;physics(dt);drawBattle();requestAnimationFrame(frame)}
resize();petLoop();requestAnimationFrame(frame);
setInterval(()=>{let st=stat(state.pet);st.full=Math.max(0,st.full-.5);if(st.full<25)st.mood=Math.max(0,st.mood-.3);save();updatePetUI()},60000);
})();
</script>
