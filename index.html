<style>

<body>
<div id="app">
<header><div><h1>🐾 狗狗叠叠乐</h1><div class="sub">异形狗狗 × 阶段目标 × 随机构筑</div></div><div class="metrics"><div class="metric"><b id="bones">0</b><span>本轮骨头</span></div><div class="metric"><b id="coins">0</b><span>金币</span></div><div class="metric"><b id="best">0</b><span>最高分</span></div></div></header>
<div id="stage"><div id="roundInfo">第 <b id="round">1</b> 阶段<br>目标 <b id="goal">40</b> 🦴　剩余 <b id="drops">8</b></div><div id="nextCard">下一个<br><canvas id="nextFace" width="112" height="92"></canvas></div><div id="danger"></div><div id="aim"></div><div id="combo"></div><canvas id="game"></canvas><div id="hint"><span>左右拖动，松手放下狗狗</span></div></div>

</div>
<div class="modal" id="choiceModal"><div class="panel"><div class="trophy" id="resultIcon">🏆</div><h2 id="resultTitle">目标达成！</h2><p id="resultText"></p><div class="choices" id="choiceList"></div></div></div>

<div class="modal" id="gameOverModal"><div class="panel"><div class="trophy">🏠</div><h2>院子挤满啦</h2><p>最终得分：<b id="finalScore">0</b><br>到达第 <b id="finalRound">1</b> 阶段</p><div class="badges" id="finalTraits"></div><button class="mainBtn wide" id="again">再来一局</button></div></div>

<script>
(()=>{'use strict';
const $=s=>document.querySelector(s),canvas=$('#game'),ctx=canvas.getContext('2d'),stage=$('#stage'),nctx=$('#nextFace').getContext('2d');
let W=0,H=0,DPR=1,last=performance.now(),drag=false,dropX=180,gameOver=false,paused=false,dangerTime=0;
let bodies=[],particles=[],score=0,bones=0,coins=0,round=1,dropsLeft=8,goal=40,current=0,next=0,combo=0,comboClock=0;
let best=+(localStorage.getItem('dogStackBest')||0),musicOn=localStorage.getItem('dogMusic')!=='off',deck=[0,0,0,0,1,1,2],traits={},shopStock=[];$('#best').textContent=best;
const DOGS=[
{name:'奶狗',shape:'round',w:35,h:35,mass:.8,rest:.35,fric:.79,fur:'#f2d0a9',ear:'#c68c59',mark:'#fff1d8',parts:[[0,0,.48]]},
{name:'柯基',shape:'long',w:61,h:34,mass:1,rest:.28,fric:.86,fur:'#e69a52',ear:'#a95f36',mark:'#fff0d6',parts:[[-.29,.05,.30],[0,.02,.34],[.29,.05,.30]]},
{name:'柴犬',shape:'fox',w:48,h:43,mass:1.12,rest:.42,fric:.70,fur:'#d78147',ear:'#96502f',mark:'#ffe6c8',parts:[[-.19,.06,.32],[.19,.06,.32],[0,-.17,.29]]},
{name:'比熊',shape:'cloud',w:55,h:49,mass:.9,rest:.18,fric:.94,fur:'#fff8ec',ear:'#ddcfc2',mark:'#fff',parts:[[-.25,0,.28],[0,-.12,.31],[.25,0,.28],[0,.18,.29]]},
{name:'法斗',shape:'square',w:57,h:53,mass:1.45,rest:.22,fric:.88,fur:'#aaa19b',ear:'#625b58',mark:'#eee5dd',parts:[[-.25,-.1,.29],[.25,-.1,.29],[-.25,.2,.29],[.25,.2,.29],[0,.03,.31]]},
{name:'金毛',shape:'bean',w:70,h:52,mass:1.6,rest:.2,fric:.82,fur:'#dfad55',ear:'#a56b31',mark:'#f4d49b',parts:[[-.27,0,.33],[.04,-.04,.37],[.31,.05,.30]]},
{name:'哈士奇',shape:'diamond',w:66,h:64,mass:1.7,rest:.62,fric:.53,fur:'#9ea9b4',ear:'#596775',mark:'#f9f3ea',parts:[[0,-.27,.29],[-.23,.02,.31],[.23,.02,.31],[0,.27,.30]]},
{name:'萨摩耶',shape:'star',w:78,h:73,mass:1.35,rest:.36,fric:.75,fur:'#fffaf1',ear:'#dfd2c8',mark:'#fff',parts:[[0,0,.36],[-.31,-.15,.25],[.31,-.15,.25],[-.29,.2,.25],[.29,.2,.25],[0,-.34,.24]]},
{name:'阿拉斯加',shape:'block',w:89,h:72,mass:2.25,rest:.28,fric:.83,fur:'#656970',ear:'#353941',mark:'#ebe5df',parts:[[-.29,-.13,.31],[0,-.16,.34],[.29,-.13,.31],[-.28,.2,.31],[.03,.2,.36],[.32,.2,.29]]},
{name:'狗狗之王',shape:'crown',w:105,h:92,mass:2.6,rest:.32,fric:.80,fur:'#bc7e49',ear:'#754426',mark:'#ffe1ad',parts:[[-.3,-.13,.31],[0,-.2,.38],[.3,-.13,.31],[-.28,.22,.33],[.05,.22,.39],[.34,.22,.30]]}
];
const REWARDS=[
{id:'tiny',name:'迷你狗粮',desc:'所有新狗体型缩小 6%',apply:()=>addTrait('tiny')},{id:'magnet',name:'友好磁场',desc:'相同品种会轻微互相吸引',apply:()=>addTrait('magnet')},{id:'rich',name:'金骨头',desc:'合成获得金币 +40%',apply:()=>addTrait('rich')},{id:'calm',name:'安抚玩具',desc:'所有狗反弹降低 15%',apply:()=>addTrait('calm')},{id:'extra',name:'加餐时间',desc:'以后每阶段多投放 1 只狗',apply:()=>addTrait('extra')},{id:'goalcut',name:'训练手册',desc:'以后阶段目标降低 10%',apply:()=>addTrait('goalcut')},{id:'reroll',name:'幸运项圈',desc:'商店价格降低 15%',apply:()=>addTrait('reroll')},{id:'leash',name:'牵引绳',desc:'危险线宽限时间增加 1 秒',apply:()=>addTrait('leash')}];
const PENALTIES=[
{id:'large',name:'吃太饱了',desc:'所有新狗体型增大 7%',apply:()=>addTrait('large')},{id:'bouncy',name:'兴奋过头',desc:'所有狗反弹增加 18%',apply:()=>addTrait('bouncy')},{id:'narrow',name:'院子施工',desc:'左右边界各向内缩 8 像素',apply:()=>addTrait('narrow')},{id:'tax',name:'零食涨价',desc:'商店价格增加 18%',apply:()=>addTrait('tax')},{id:'tired',name:'犯困',desc:'下一阶段少投放 1 只狗',apply:()=>addTrait('tired')},{id:'greedy',name:'挑食',desc:'以后阶段目标提高 10%',apply:()=>addTrait('greedy')}];
function addTrait(id){traits[id]=(traits[id]||0)+1;updateTraitText()}function has(id){return traits[id]||0}function shuffle(a){return [...a].sort(()=>Math.random()-.5)}function pick(a,n=3){return shuffle(a).slice(0,n)}
function toast(s){let t=$('#toast');t.textContent=s;t.style.opacity=1;t.style.transform='translateX(-50%) translateY(0)';clearTimeout(toast.t);toast.t=setTimeout(()=>{t.style.opacity=0;t.style.transform='translateX(-50%) translateY(10px)'},1200)}
function resize(){const r=canvas.getBoundingClientRect();DPR=Math.min(devicePixelRatio||1,2);W=r.width;H=r.height;canvas.width=Math.round(W*DPR);canvas.height=Math.round(H*DPR);ctx.setTransform(DPR,0,0,DPR,0,0);dropX=Math.max(35,Math.min(W-35,dropX||W/2));$('#aim').style.left=(dropX-1)+'px'}new ResizeObserver(resize).observe(stage);
function dogScale(){return Math.max(.72,1-has('tiny')*.06+has('large')*.07)}function newBody(type,x,y){const d=DOGS[type],s=dogScale();return{x,y,vx:0,vy:0,rot:(Math.random()-.5)*.14,av:0,type,scale:s,w:d.w*s,h:d.h*s,mass:d.mass*s*s,born:performance.now(),pop:0}}
function partsOf(b){const d=DOGS[b.type],c=Math.cos(b.rot),s=Math.sin(b.rot);return d.parts.map(p=>{let lx=p[0]*b.w,ly=p[1]*b.h;return{x:b.x+lx*c-ly*s,y:b.y+lx*s+ly*c,r:p[2]*Math.min(b.w,b.h)}})}
function randomDeckDog(){return deck[(Math.random()*deck.length)|0]}
function reset(){bodies=[];particles=[];score=0;bones=0;coins=0;round=1;goal=40;dropsLeft=8;deck=[0,0,0,0,1,1,2];traits={};gameOver=false;paused=false;dangerTime=0;combo=0;current=randomDeckDog();next=randomDeckDog();$('#gameOverModal').style.display='none';$('#choiceModal').style.display='none';$('#shopModal').style.display='none';$('#hint').style.opacity=1;makeShop();updateUI();startMusic()}
function updateUI(){$('#bones').textContent=bones;$('#coins').textContent=coins;$('#round').textContent=round;$('#goal').textContent=goal;$('#drops').textContent=dropsLeft;$('#best').textContent=best;const counts={};deck.forEach(x=>counts[x]=(counts[x]||0)+1);$('#deckText').textContent='牌组：'+Object.entries(counts).map(([k,v])=>DOGS[k].name+'×'+v).join('、');drawDog(nctx,56,46,Math.min(46,DOGS[next].w*.65),next,0,true)}
function updateTraitText(){let names=[...REWARDS,...PENALTIES].filter(x=>has(x.id)).map(x=>x.name+(has(x.id)>1?'×'+has(x.id):''));$('#traitText').textContent=names.length?'特性：'+names.join('、'):'暂无特性'}
function face(c,r){c.fillStyle='#493733';c.beginPath();c.arc(-r*.2,-r*.08,r*.065,0,7);c.arc(r*.2,-r*.08,r*.065,0,7);c.fill();c.fillStyle='#3d2e2a';c.beginPath();c.ellipse(0,r*.09,r*.12,r*.085,0,0,7);c.fill();c.strokeStyle='#684b42';c.lineWidth=Math.max(1.2,r*.035);c.lineCap='round';c.beginPath();c.moveTo(0,r*.17);c.quadraticCurveTo(-r*.1,r*.28,-r*.22,r*.21);c.stroke();c.beginPath();c.moveTo(0,r*.17);c.quadraticCurveTo(r*.1,r*.28,r*.22,r*.21);c.stroke()}
function drawDog(c,x,y,size,t,rot=0,clear=false){if(clear)c.clearRect(0,0,c.canvas.width,c.canvas.height);const d=DOGS[t],sc=size/Math.max(d.w,d.h);c.save();c.translate(x,y);c.rotate(rot);c.scale(sc,sc);c.shadowColor='rgba(65,42,37,.2)';c.shadowBlur=7/sc;c.shadowOffsetY=4/sc;c.fillStyle=d.ear;if(d.shape==='long'||d.shape==='bean'){c.beginPath();c.ellipse(-d.w*.4,-d.h*.18,d.w*.15,d.h*.35,-.3,0,7);c.ellipse(d.w*.38,-d.h*.12,d.w*.15,d.h*.34,.3,0,7);c.fill()}else{c.beginPath();c.moveTo(-d.w*.34,-d.h*.3);c.lineTo(-d.w*.18,-d.h*.7);c.lineTo(-d.w*.03,-d.h*.32);c.closePath();c.fill();c.beginPath();c.moveTo(d.w*.34,-d.h*.3);c.lineTo(d.w*.18,-d.h*.7);c.lineTo(d.w*.03,-d.h*.32);c.closePath();c.fill()}c.fillStyle=d.fur;if(d.shape==='round'){c.beginPath();c.arc(0,0,d.w*.47,0,7);c.fill()}else if(d.shape==='long'){c.beginPath();c.roundRect(-d.w*.5,-d.h*.42,d.w,d.h*.84,d.h*.35);c.fill()}else if(d.shape==='fox'||d.shape==='diamond'){c.beginPath();c.moveTo(0,-d.h*.5);c.lineTo(d.w*.5,-d.h*.06);c.lineTo(0,d.h*.5);c.lineTo(-d.w*.5,-d.h*.06);c.closePath();c.fill()}else if(d.shape==='cloud'||d.shape==='star'){for(const p of d.parts){c.beginPath();c.arc(p[0]*d.w,p[1]*d.h,p[2]*Math.min(d.w,d.h),0,7);c.fill()}}else if(d.shape==='square'||d.shape==='block'||d.shape==='crown'){c.beginPath();c.roundRect(-d.w*.5,-d.h*.43,d.w,d.h*.86,d.h*.18);c.fill()}else{c.beginPath();c.ellipse(0,0,d.w*.5,d.h*.45,0,0,7);c.fill()}c.shadowColor='transparent';c.fillStyle=d.mark;if(t===2||t===6||t===8){c.beginPath();c.moveTo(-d.w*.39,-d.h*.22);c.quadraticCurveTo(-d.w*.12,-d.h*.34,0,-d.h*.05);c.quadraticCurveTo(d.w*.12,-d.h*.34,d.w*.39,-d.h*.22);c.lineTo(d.w*.26,d.h*.12);c.quadraticCurveTo(0,-d.h*.02,-d.w*.26,d.h*.12);c.closePath();c.fill()}c.beginPath();c.ellipse(0,d.h*.12,d.w*.27,d.h*.22,0,0,7);c.fill();face(c,Math.min(d.w,d.h)*.72);if(t===9){c.fillStyle='#f0c54e';c.beginPath();c.moveTo(-d.w*.28,-d.h*.48);c.lineTo(-d.w*.18,-d.h*.76);c.lineTo(0,-d.h*.52);c.lineTo(d.w*.18,-d.h*.76);c.lineTo(d.w*.3,-d.h*.48);c.closePath();c.fill()}c.restore()}
let audio,musicTimer,musicStep=0;function ensureAudio(){try{audio ||= new (window.AudioContext||window.webkitAudioContext)()}catch(e){}}function tone(freq,dur=.1,type='sine',vol=.025,delay=0){ensureAudio();if(!audio)return;const o=audio.createOscillator(),g=audio.createGain(),now=audio.currentTime+delay;o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,now);g.gain.exponentialRampToValueAtTime(.0001,now+dur);o.connect(g);g.connect(audio.destination);o.start(now);o.stop(now+dur)}
function startMusic(){clearInterval(musicTimer);$('#musicBtn').textContent=musicOn?'🎵':'🔇';if(!musicOn)return;const notes=[261.6,329.6,392,329.6,293.7,349.2,440,349.2,246.9,329.6,392,493.9,293.7,349.2,440,392];musicTimer=setInterval(()=>{if(paused||gameOver||!musicOn)return;let n=notes[musicStep++%notes.length];tone(n,.55,'sine',.009);if(musicStep%4===1)tone(n/2,.7,'triangle',.006)},430)}function toggleMusic(){musicOn=!musicOn;localStorage.setItem('dogMusic',musicOn?'on':'off');startMusic();if(musicOn){ensureAudio();audio&&audio.resume()}}
function drop(){if(gameOver||paused||dropsLeft<=0)return;let b=newBody(current,Math.max(35,Math.min(W-35,dropX)),42);b.vx=(Math.random()-.5)*6;bodies.push(b);current=next;next=randomDeckDog();dropsLeft--;tone(245,.05,'sine',.032);$('#hint').style.opacity=0;updateUI();if(dropsLeft===0)setTimeout(checkRound,2200)}
function burst(x,y){for(let i=0;i<12;i++)particles.push({x,y,vx:(Math.random()-.5)*190,vy:-40-Math.random()*160,life:.75,r:3+Math.random()*5,col:['#f5c85b','#ef91ae','#a6d6b6','#fff'][i%4]})}
function showCombo(){if(combo<2)return;let e=$('#combo');e.textContent='连锁 × '+combo;e.style.opacity=1;e.style.transform='translateX(-50%) scale(1)';clearTimeout(showCombo.t);showCombo.t=setTimeout(()=>{e.style.opacity=0;e.style.transform='translateX(-50%) scale(.75)'},650)}
function merge(a,b){if(a.type!==b.type)return false;let t=a.type,x=(a.x+b.x)/2,y=(a.y+b.y)/2;bodies=bodies.filter(q=>q!==a&&q!==b);let gain=6*(t+1)*(t+1),cash=Math.max(1,Math.round((t+1)*(1+has('rich')*.4)));bones+=gain;coins+=cash;score+=gain*10;combo++;comboClock=.9;showCombo();burst(x,y);tone(390+t*52,.13,'triangle',.045);if(t<DOGS.length-1){let nb=newBody(t+1,x,y);nb.vx=(a.vx+b.vx)/2;nb.vy=-70;nb.pop=1;bodies.push(nb)}else{coins+=100;score+=5000;tone(880,.3,'sine',.06)}if(score>best){best=score;localStorage.setItem('dogStackBest',best)}updateUI();return true}
function circleCollide(a,b,pa,pb){let dx=pb.x-pa.x,dy=pb.y-pa.y,dist=Math.hypot(dx,dy)||.001,min=pa.r+pb.r;if(dist>=min)return false;let nx=dx/dist,ny=dy/dist,over=min-dist,invA=1/a.mass,invB=1/b.mass,sum=invA+invB;a.x-=nx*over*(invA/sum);a.y-=ny*over*(invA/sum);b.x+=nx*over*(invB/sum);b.y+=ny*over*(invB/sum);let rv=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;if(rv<0){let rest=((DOGS[a.type].rest+DOGS[b.type].rest)/2)*(1+has('bouncy')*.18)*(1-has('calm')*.15),j=-(1+rest)*rv/sum;a.vx-=j*nx*invA;a.vy-=j*ny*invA;b.vx+=j*nx*invB;b.vy+=j*ny*invB}return true}
function physics(dt){if(comboClock>0){comboClock-=dt;if(comboClock<=0)combo=0}let left=3+has('narrow')*8,right=W-3-has('narrow')*8;for(let b of bodies){if(has('magnet'))for(let o of bodies)if(o!==b&&o.type===b.type){let dx=o.x-b.x,dy=o.y-b.y,d2=dx*dx+dy*dy;if(d2<18000&&d2>100){b.vx+=dx/Math.sqrt(d2)*has('magnet')*8*dt;b.vy+=dy/Math.sqrt(d2)*has('magnet')*8*dt}}b.vy+=920*dt;b.x+=b.vx*dt;b.y+=b.vy*dt;b.rot+=b.av*dt;b.av*=.985;b.vx*=Math.pow(.995,dt*60);for(let p of partsOf(b)){if(p.x-p.r<left){let d=left-(p.x-p.r);b.x+=d;b.vx=Math.abs(b.vx)*DOGS[b.type].rest}if(p.x+p.r>right){let d=(p.x+p.r)-right;b.x-=d;b.vx=-Math.abs(b.vx)*DOGS[b.type].rest}if(p.y+p.r>H-3){let d=(p.y+p.r)-(H-3);b.y-=d;b.vy=-Math.abs(b.vy)*DOGS[b.type].rest;b.vx*=DOGS[b.type].fric;if(Math.abs(b.vy)<14)b.vy=0}}if(b.pop)b.pop=Math.max(0,b.pop-dt*4)}for(let iter=0;iter<3;iter++){let did=false;outer:for(let i=0;i<bodies.length;i++)for(let j=i+1;j<bodies.length;j++){let a=bodies[i],b=bodies[j],aps=partsOf(a),bps=partsOf(b),hit=false;for(let pa of aps){for(let pb of bps){if(Math.hypot(pb.x-pa.x,pb.y-pa.y)<pa.r+pb.r){hit=true;break}}if(hit)break}if(hit&&a.type===b.type&&performance.now()-a.born>100&&performance.now()-b.born>100){did=merge(a,b);if(did)break outer}if(hit)for(let pa of aps)for(let pb of bps)circleCollide(a,b,pa,pb)}if(did)continue}for(let p of particles){p.vy+=330*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt}particles=particles.filter(p=>p.life>0);let crowded=bodies.some(b=>performance.now()-b.born>1400&&partsOf(b).some(p=>p.y-p.r<92)&&Math.hypot(b.vx,b.vy)<75);dangerTime=crowded?dangerTime+dt:Math.max(0,dangerTime-dt*2.2);if(dangerTime>2.25+has('leash'))endGame()}
function draw(){ctx.clearRect(0,0,W,H);let d=DOGS[current],size=Math.max(d.w,d.h)*dogScale();ctx.save();ctx.globalAlpha=.93;drawDog(ctx,dropX,43,size,current,0,false);ctx.restore();for(let b of bodies){let size=Math.max(b.w,b.h);ctx.save();if(b.pop){let s=1+Math.sin((1-b.pop)*Math.PI)*.15;ctx.translate(b.x,b.y);ctx.scale(s,s);ctx.translate(-b.x,-b.y)}drawDog(ctx,b.x,b.y,size,b.type,b.rot,false);ctx.restore()}for(let p of particles){ctx.save();ctx.globalAlpha=Math.max(0,p.life/.75);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();ctx.restore()}if(dangerTime){ctx.fillStyle=`rgba(225,80,115,${Math.min(.15,dangerTime*.06)})`;ctx.fillRect(0,0,W,94)}}function loop(t){let dt=Math.min(.026,(t-last)/1000);last=t;if(!paused&&!gameOver)physics(dt);draw();requestAnimationFrame(loop)}
function checkRound(){if(gameOver||paused||dropsLeft!==0)return;paused=true;let success=bones>=goal,choices=pick(success?REWARDS:PENALTIES,3);$('#resultIcon').textContent=success?'🏆':'🐾';$('#resultTitle').textContent=success?'阶段目标达成！':'阶段目标未达成';$('#resultText').textContent=success?`收集了 ${bones}/${goal} 根骨头。选择一项奖励。`:`只收集了 ${bones}/${goal} 根骨头。选择一项惩罚后继续。`;let list=$('#choiceList');list.innerHTML='';choices.forEach(o=>{let b=document.createElement('button');b.className='choice '+(success?'good':'bad');b.innerHTML=`<strong>${success?'✨':'⚠️'} ${o.name}</strong><small>${o.desc}</small>`;b.onclick=()=>{o.apply();$('#choiceModal').style.display='none';startNextRound()};list.appendChild(b)});$('#choiceModal').style.display='flex'}
function startNextRound(){round++;bones=0;dropsLeft=Math.max(5,8+has('extra')-(has('tired')?1:0));if(has('tired'))traits.tired=Math.max(0,traits.tired-1);goal=Math.round((35+round*18)*(1-has('goalcut')*.1+has('greedy')*.1));paused=false;makeShop();updateUI();toast('第 '+round+' 阶段开始')}
function makeShop(){let maxDog=Math.min(7,2+Math.floor(round/2)),items=[];for(let i=0;i<3;i++){let type=1+((Math.random()*maxDog)|0);items.push({kind:'dog',type,name:'领养 '+DOGS[type].name,desc:'向牌组加入一张 '+DOGS[type].name,base:18+type*12})}for(let r of pick(REWARDS,2))items.push({kind:'trait',ref:r,name:r.name,desc:r.desc,base:65});items.push({kind:'remove',name:'精简牌组',desc:'移除牌组中一张最低级狗',base:50});shopStock=items;renderShop()}function price(it){return Math.max(5,Math.round(it.base*(1-has('reroll')*.15+has('tax')*.18)))}function renderShop(){$('#shopCoins').textContent=coins;let g=$('#shopGrid');g.innerHTML='';shopStock.forEach((it,idx)=>{let el=document.createElement('button');el.className='shopItem';el.innerHTML=`<b>${it.name}</b><small>${it.desc}</small><span class="price">${price(it)} 🪙</span>`;el.onclick=()=>buy(idx);g.appendChild(el)})}function buy(i){let it=shopStock[i],p=price(it);if(coins<p){toast('金币不够');return}coins-=p;if(it.kind==='dog')deck.push(it.type);if(it.kind==='trait')it.ref.apply();if(it.kind==='remove'){let min=Math.min(...deck),at=deck.indexOf(min);if(deck.length>3&&at>=0)deck.splice(at,1);else{coins+=p;toast('牌组不能再精简');return}}shopStock.splice(i,1);tone(620,.12,'triangle',.04);toast('购买成功');updateUI();renderShop()}
function endGame(){gameOver=true;paused=true;clearInterval(musicTimer);$('#finalScore').textContent=score;$('#finalRound').textContent=round;let box=$('#finalTraits');box.innerHTML='';[...REWARDS,...PENALTIES].filter(x=>has(x.id)).forEach(x=>{let s=document.createElement('span');s.className='badge';s.textContent=x.name+(has(x.id)>1?'×'+has(x.id):'');box.appendChild(s)});$('#gameOverModal').style.display='flex';tone(155,.4,'sawtooth',.04)}
function pointerX(e){let r=canvas.getBoundingClientRect(),p=e.touches?e.touches[0]:e;return p.clientX-r.left}function start(e){if(gameOver||paused||dropsLeft<=0)return;drag=true;move(e);ensureAudio();audio&&audio.resume();e.preventDefault()}function move(e){if(!drag)return;let d=DOGS[current],m=Math.max(d.w,d.h)*dogScale()/2+4;dropX=Math.max(m,Math.min(W-m,pointerX(e)));$('#aim').style.left=(dropX-1)+'px';e.preventDefault()}function end(e){if(!drag)return;drag=false;drop();e.preventDefault()}
canvas.addEventListener('touchstart',start,{passive:false});canvas.addEventListener('touchmove',move,{passive:false});canvas.addEventListener('touchend',end,{passive:false});canvas.addEventListener('mousedown',start);addEventListener('mousemove',move);addEventListener('mouseup',end);$('#restart').onclick=reset;$('#again').onclick=reset;$('#musicBtn').onclick=toggleMusic;$('#shopBtn').onclick=()=>{if(gameOver)return;paused=true;renderShop();$('#shopModal').style.display='flex'};$('#closeShop').onclick=()=>{$('#shopModal').style.display='none';paused=false};resize();reset();requestAnimationFrame(loop)
})();
</script></body></html>
